<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bollywood Love Climax</title>

<style>
body{
    margin:0;
    font-family:'Georgia',serif;
    background:radial-gradient(circle at top,#2c0000,#000);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    overflow:hidden;
}

/* Card */
.card{
    background:rgba(0,0,0,0.65);
    padding:30px;
    border-radius:30px;
    width:90%;
    max-width:480px;
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,0.9);
    animation:entry 2s ease;
    z-index:2;
}

@keyframes entry{
    from{opacity:0;transform:translateY(80px);}
    to{opacity:1;transform:translateY(0);}
}

.heart{
    font-size:55px;
    animation:beat 1.2s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.5);}
    100%{transform:scale(1);}
}

.name{
    font-size:30px;
    margin:15px 0;
    color:#ffd27d;
    text-shadow:0 0 25px gold;
}

button{
    margin:12px;
    padding:14px 34px;
    border:none;
    border-radius:35px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.yes{background:#ffd27d;color:#000;}
.play{background:#fff;color:#000;}

/* Popup */
.popup{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:5;
}

.popup-box{
    background:#000;
    color:#ffd27d;
    padding:40px;
    border-radius:30px;
    border:3px solid gold;
    text-align:center;
    animation:zoom 2s ease;
}

@keyframes zoom{
    from{transform:scale(0.3);}
    to{transform:scale(1);}
}

/* FIREWORK PARTICLES */
.firework{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    animation:explode 4s ease-out forwards;
}

@keyframes explode{
    0%{
        transform:translate(0,0) scale(0.2);
        opacity:1;
    }
    100%{
        transform:translate(var(--x),var(--y)) scale(1.2);
        opacity:0;
    }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="romantic.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Bollywood Love Story</h1>
    <div class="name">My Forever 💕</div>

    <p>
        “Har film ka ek climax hota hai…  
        Aur meri zindagi ka climax tum ho 💍”
    </p>

    <h2>Will You Be Mine Forever?</h2>

    <button class="yes" onclick="accept()">YES 💖</button><br>
    <button class="play" onclick="playPause()">▶ Play Music</button>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <h1>🎆 SHE SAID YES 🎆</h1>
        <p>
            Slow motion mein dil dhadak raha hai…  
            Aasman bhi aaj roshan hai ✨  
            **Forever Begins Now 💍❤️**
        </p>
    </div>
</div>

<script>
let music=document.getElementById("music");
let playing=false;

function playPause(){
    if(!playing){
        music.play();
        playing=true;
    }else{
        music.pause();
        playing=false;
    }
}

function accept(){
    document.getElementById("popup").style.display="flex";
    music.play();
    slowFireworks();
}

/* SLOW MOTION FIREWORKS */
function slowFireworks(){
    for(let i=0;i<12;i++){
        setTimeout(()=>burst(), i*600);
    }
}

function burst(){
    let centerX = Math.random()*window.innerWidth;
    let centerY = Math.random()*window.innerHeight/2;

    for(let i=0;i<40;i++){
        let f=document.createElement("div");
        f.className="firework";
        f.style.left=centerX+"px";
        f.style.top=centerY+"px";

        let angle=Math.random()*2*Math.PI;
        let distance=Math.random()*250+50;

        f.style.setProperty("--x",Math.cos(angle)*distance+"px");
        f.style.setProperty("--y",Math.sin(angle)*distance+"px");
        f.style.background=`hsl(${Math.random()*360},100%,60%)`;

        document.body.appendChild(f);
        setTimeout(()=>f.remove(),4000);
    }
}
</script>

</body>
</html>
