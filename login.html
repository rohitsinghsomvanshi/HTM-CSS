
<head>
    
    <title>Login Page</title>
    <style>
       body{
            background: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            
        }
        .register a:hover{
            text-decoration: underline;
        }

        .login-container{
            background: white;
            padding: 40px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 60px rgb(218, 167, 26);
            text-align: center;
        }
        .login-container input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-shadow: 0 0 25px;
            
        }
        button:hover{
            cursor: pointer;
            background-color: red;
        }
      
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <form  >
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="register">
         <a href="#">Register</a>
        </div>
    </div>

</body>
</html>
