<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goldy Cab Service Logo (SVG)</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f5f5f5;
    }
    svg{
        width:300px;
        height:300px;
    }
    .circle-text{
        font-family: Arial, sans-serif;
        font-weight: bold;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<svg viewBox="0 0 300 300">

   
    <circle cx="168.5" cy="147.8" r="124.4" fill="yellow" stroke="black"/>
   
    <path d="M 80 232  
             Q 60 40 260.8 68"
            fill="aqua" stroke="black" stroke-width="5"/>
    <path d="M 79.5 229.5  
             Q 260 255 258 69"
             fill="aqua"  stroke="black" stroke-width="5.3"/>
         
        <text x="115" y="155"
          font-size="90"
          font-family="Great Vibes"
          font-weight="bold"
          font-style="italic"
          fill="green" >G</text>

        <text x="160" y="170"
          font-size="90"
          font-family="Great Vibes"
          font-weight="bold"
          font-style="italic"
          fill="yellow" >C</text>

        <text x="105" y="213"
          font-size="90"
          font-family="Great Vibes"
          font-weight="bold"
          font-style="italic"
          fill="red" >S</text>


    <path id="curve" d="M 75 208 Q 67 38 260.8 64.5"
           fill="none" stroke="none"/>
    
    <text font-size="24" font-weight="bold" fill="red">
        <textpath href="#curve">
            GOLDY CAB SERVICE
        </textpath>
    </text>
    <!-- Bottom Text -->
     <path id="bottom" d="M 260.5 95 Q 258 253 79.5 233.8"
           fill="none" stroke="none"/>
    
    <text font-size="25" font-weight="bold" fill="green">
        <textpath href="#bottom">
            Tourist & Taxi Service
        </textpath>
    </text>
   </svg>
</body>
</html>
