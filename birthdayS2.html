<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#181112,#d94382,rgb(60, 190, 190), rgb(197, 42, 173));
    font-family:'Segoe UI',sans-serif;
}

/* NAME SCREEN */
.name-box{
    background:linear-gradient(rgb(185, 73, 73) , pink , aqua);
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:320px;
    box-shadow:0 15px 40px rgba(5,5,5,.3);
}
.name-box input{
    width:90%;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
    font-size:16px;
    margin-bottom:15px;
}
.name-box button{
    background:#ff3d68;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

/* CARD */
.card{
    display:none;
    background:linear-gradient(rgb(225, 14, 49),rgb(199, 159, 84),rgb(26, 111, 202));
    padding:20px;
    border-radius:20px;
    text-align:center;
    width:100%;
    height: 90%;
    max-width:350px;
    box-shadow:0 15px 40px rgba(155, 207, 178, 0.3);
}

/* SLIDER */
.slider{
    width:100%;
    height:280px;
    overflow:hidden;
    border-radius:15px;
    margin-bottom:15px;
}
.slides{
    display:flex;
    width:400%;
    animation:slide 12s infinite ;
 
}
.slides img{
    width:350px;
    height: 300px;
    object-fit:cover;
}
 @keyframes slide{
    0%   { transform: translateX(0%); }
    20%  { transform: translateX(0%); }

    25%  { transform: translateX(-25%); }
    45%  { transform: translateX(-25%); }

    50%  { transform: translateX(-50%); }
    70%  { transform: translateX(-50%); }

    75%  { transform: translateX(-75%); }
    95%  { transform: translateX(-75%); }

    100% { transform: translateX(0%); }
} 



.cake{
    top: 22px;
    margin:18px auto;
    width:140px;
    height:85px;
    border-radius:15px;
    position:relative;
    cursor:pointer;
    background: linear-gradient(
        -65deg,
        red, orange, yellow, green, cyan, blue, violet
    );
    background-size: 400% 400%;
    animation: rainbowCake 9s linear infinite;
}

@keyframes rainbowCake {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}


.candle{
    width:10px;
    height:35px;
    background: linear-gradient(
        180deg,
        red, orange, yellow, green, cyan, blue, violet
    );
    border-radius:5px;
    position:absolute;
    top:-32px;
    left:50%;
    transform:translateX(-50%);
}


.flame{
    width:16px;
    height:16px;
    border-radius:50%;
    position:absolute;
    top:-16px;
    left:50%;
    transform:translateX(-50%);
    background: radial-gradient(circle, yellow, orange, red);
    animation: flickerRainbow .4s infinite;
}




@keyframes flicker{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.2);}
}


button{
    border:none;
    padding:10px 18px;
    border-radius:25px;
    font-size:14px;
    cursor:pointer;
    margin:6px;
}
.whatsapp{
    background:#25D366;
    color:white;
    margin-top:-6px;
}

h2{color:#0a0a0a;}
p{font-size:14px;}



</style>
</head>

<body>
   


<div class="name-box" id="nameBox">
    <h2>🎁 Enter Name</h2>
    <input type="text" id="nameInput" placeholder="Enter Birthday person Name">
    <br>
    <button onclick="openSurprise()">Click 🎉</button>
</div>


<div class="card" id="card">

   
    <div class="slider">
        <div class="slides">
          
        
           <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIGV9pyyLDrXQvuIwzx8Oo9dk__r53RvM_mw&s">
            <img src="s1img.jpg">
            <img src="https://static.tnn.in/photo/97512592/97512592.jpg">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQsI7OpZOBFkp0P6V7kNgz3PjVbrbcw5nlH2A&s">
      
        </div>
        
    </div>

    <h2>🎂 Happy Birthday <span id="personName"></span> ❤️</h2>
    

    <div class="cake" onclick="blowCandle()">
        <div class="candle">
            <div class="flame" id="flame"></div>
            
        </div>
        <H4>Click/Tap on the Cake ✨</H4>
    </div>

          <h5>          😍💕💖❤️<br>
              उगता हुआ सूरज दुआ दे आपको , <br>
              खिलता हुआ फूल खुशबू दे आपको , <br>
              ऊपर वाला हज़ार खुशियाँ दे आपको || <br>
        May your life be full of happiness & love 💖<br>
            💕I Wish You Very Happy Birthday💕</h5>

    <button class="whatsapp" onclick="shareWhatsApp()">
        📱 Share on WhatsApp
    </button>

</div>

<script>
let userName = "";

function openSurprise(){
    
    // input se value lena
    userName = document.getElementById("nameInput").value.trim();
    let correctName = [ "satya" ,"satya singh"];

    if(userName === ""){
        alert("Please Enter a name whose Birthday ❤️");
        return;
    }
   if(correctName.includes(userName.toLocaleLowerCase())){
    /*if(userName.toLowerCase() === correctName.toLowerCase()){*/
        document.getElementById("personName").innerText = userName;
        document.getElementById("nameBox").style.display = "none";
        document.getElementById("card").style.display = "block";

        
    } else {
        alert("❌ Tumhra Birthday Nahi hai , Agar hai bhi to mughe nahi pata / Mai Nahi Janta Tumko !!");
    }
}

function blowCandle(){
   

    if(flame){
        flame.style.display = "none";
        alert(
            "🎉 Very Very Happy Birthday " + userName +
            "\n    !!  💕💖💕   !!   "+
            "\n💕आज तुम्हारे जन्मदिन पर, मैं करता हूं विश"+
            "\nचींटी से लेकर हाथी तक, सभी तुम्हें करें किस😂  "+
            "\nजन्मदिन की हार्दिक बधाई आपको  !! 💕"+
            "\n   !!  😂😍🤣😁🤪   !!"+
            "\n💕 !! Enjoy Your Day !! 💕"
        );
    }
}

function shareWhatsApp(){
    let msg = "🎂 Very Happy Returns of the Day " + userName +"\n💕💖"+
    "\nजन्मदिन की इस खास तारीख पर,"+
"\nउम्मीद करता हूं कि जीवन की हर राह पर,"+
"\n आपके साथ केवल खुशियां और सफलता हो |"+
"!! 💕💖  जन्मदिन की शुभकामनाएं   💖💕!! "+
" ❤️\nMay your life be filled with love, smiles & happiness 🎉";
    let url = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
}


</script>

</body>
</html>
